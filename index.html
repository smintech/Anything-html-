
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet the Consonants! (Auto-Player)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #00A8E8;
    --secondary: #007EA7;
    --accent: #FFCC00;
    --bg: #F4F9FF;
    --text-dark: #1a1a2e;
    --a-color: #FF4B6E;
    --e-color: #FF8C00;
    --i-color: #00C48C;
    --o-color: #4B6EFF;
    --u-color: #9B4BFF;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    min-height: 100vh;
    padding: 20px;
    background-image: radial-gradient(circle, rgba(0,168,232,0.08) 2px, transparent 2px);
    background-size: 30px 30px;
    overflow-x: hidden;
  }

  /* ========== HEADER ========== */
  header {
    text-align: center;
    margin-bottom: 30px;
  }
  
  .title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(32px, 6vw, 60px);
    color: var(--primary);
    text-shadow: 0 4px 0 rgba(0,0,0,0.1);
    margin-bottom: 10px;
  }

  /* ========== TOP INFO ========== */
  .info-bar {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .info-tag {
    background: white;
    padding: 10px 20px;
    border-radius: 15px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.05);
    font-weight: 800;
    border: 2px solid #E8F1F8;
  }

  /* ========== CONSONANT GRID ========== */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    max-width: 1400px;
    margin: 0 auto;
  }

  @media (min-width: 1200px) {
    .grid-container { grid-template-columns: repeat(7, 1fr); }
  }

  .letter-card {
    background: white;
    border-radius: 20px;
    padding: 15px 10px 0 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.05);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
    border: 3px solid #E8F1F8;
    height: 240px; /* Fixed height to prevent layout jumps */
  }

  /* Auto-Focus & Hover States */
  .letter-card.focused, .letter-card:hover {
    transform: translateY(-8px) scale(1.05);
    border-color: var(--primary);
    box-shadow: 0 15px 30px rgba(0,168,232,0.2);
    z-index: 10;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 5px;
    align-items: center;
  }

  .letter {
    font-family: 'Fredoka One', cursive;
    font-size: 42px;
    color: var(--primary);
    line-height: 1;
  }

  .sound-badge {
    background: #E8F1F8;
    color: var(--secondary);
    font-weight: 900;
    font-size: 14px;
    padding: 2px 8px;
    border-radius: 8px;
  }

  .emoji-wrapper {
    font-size: 60px;
    margin: 10px 0;
    line-height: 1;
  }

  .word {
    font-size: 18px;
    font-weight: 900;
    color: #333;
    margin-bottom: 10px;
  }
  .word span { color: var(--primary); text-decoration: underline; }

  .sentence-bar {
    background: #f0f4f8;
    color: #666;
    width: calc(100% + 20px);
    padding: 8px 5px;
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    margin-top: auto;
    transition: background 0.3s;
  }

  .focused .sentence-bar, .letter-card:hover .sentence-bar {
    background: var(--primary);
    color: white;
  }

  /* ========== AUTO-TIP OVERLAY ========== */
  .mouth-tip {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.98);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 15px;
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 11;
  }

  .letter-card.focused .mouth-tip, .letter-card:hover .mouth-tip {
    top: 0;
  }

  .mouth-icon { font-size: 40px; margin-bottom: 8px; }
  .mouth-text { font-size: 14px; font-weight: 800; color: var(--secondary); line-height: 1.2; }

  /* ========== CONTROLS ========== */
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    background: white;
    padding: 10px 20px;
    border-radius: 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    z-index: 100;
  }

  .ctrl-btn {
    border: none;
    background: #eee;
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .ctrl-btn.active { background: var(--primary); color: white; }

  /* ========== PROGRESS BAR ========== */
  .progress-container {
    position: fixed;
    top: 0; left: 0; width: 100%;
    height: 6px;
    background: rgba(0,0,0,0.05);
    z-index: 200;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
  }

</style>
</head>
<body>

  <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

  <header>
    <h1 class="title">Meet the Consonants!</h1>
    <div class="info-bar">
      <div class="info-tag">21 Consonants</div>
      <div class="info-tag">5 Vowels</div>
      <div class="info-tag" style="border-color: var(--a-color); color: var(--a-color);">C + V = Words!</div>
    </div>
  </header>

  <div class="grid-container" id="consonant-grid"></div>

  <div class="controls">
    <button class="ctrl-btn" onclick="manualPrev()">◀</button>
    <button class="ctrl-btn active" id="playPause" onclick="toggleAuto()">Pause Auto</button>
    <button class="ctrl-btn" onclick="manualNext()">▶</button>
  </div>

<script>
  const consonants = [
    { l: "B", w: "ball", e: "⚽", s: "/b/", tip: "Lips together and pop!", m: "👄" },
    { l: "C", w: "cat", e: "🐱", s: "/k/", tip: "Click in the back of your mouth", m: "😮" },
    { l: "D", w: "dog", e: "🐶", s: "/d/", tip: "Tongue behind your top teeth", m: "😬" },
    { l: "F", w: "fish", e: "🐟", s: "/f/", tip: "Top teeth on bottom lip and blow", m: "😬" },
    { l: "G", w: "goat", e: "🐐", s: "/g/", tip: "Gulp in the back of your throat", m: "😮" },
    { l: "H", w: "hat", e: "🎩", s: "/h/", tip: "Breathe out like a big sigh", m: "😮‍💨" },
    { l: "J", w: "juice", e: "🧃", s: "/j/", tip: "Push your lips forward", m: "👄" },
    { l: "K", w: "kite", e: "🪁", s: "/k/", tip: "Click in the back of your mouth", m: "😮" },
    { l: "L", w: "lion", e: "🦁", s: "/l/", tip: "Tongue up behind your teeth", m: "👅" },
    { l: "M", w: "monkey", e: "🐒", s: "/m/", tip: "Lips together and hummmm", m: "👄" },
    { l: "N", w: "nest", e: "🪹", s: "/n/", tip: "Tongue up, voice through nose", m: "👅" },
    { l: "P", w: "pig", e: "🐷", s: "/p/", tip: "Lips together and puff out air!", m: "👄" },
    { l: "Q", w: "queen", e: "👑", s: "/kw/", tip: "Lips round like a kiss", m: "😗" },
    { l: "R", w: "rocket", e: "🚀", s: "/r/", tip: "Curl your tongue back", m: "👅" },
    { l: "S", w: "sun", e: "☀️", s: "/s/", tip: "Teeth together and hiss like a snake", m: "😬" },
    { l: "T", w: "turtle", e: "🐢", s: "/t/", tip: "Tap your tongue behind top teeth", m: "👅" },
    { l: "V", w: "van", e: "🚐", s: "/v/", tip: "Teeth on bottom lip and vibrate", m: "😬" },
    { l: "W", w: "web", e: "🕸️", s: "/w/", tip: "Make your lips a round circle", m: "😗" },
    { l: "X", w: "x-ray", e: "🩻", s: "/ks/", tip: "Back click and hiss together", m: "😬" },
    { l: "Y", w: "yo-yo", e: "🪀", s: "/y/", tip: "Tongue high and glide", m: "👅" },
    { l: "Z", w: "zebra", e: "🦓", s: "/z/", tip: "Teeth together and buzzzz", m: "😬" }
  ];

  let currentIndex = -1;
  let isAuto = true;
  let autoTimer = null;
  const slideDuration = 4000; // 4 seconds per letter

  function createGrid() {
    const grid = document.getElementById('consonant-grid');
    consonants.forEach((c, idx) => {
      const card = document.createElement('div');
      card.className = 'letter-card';
      card.id = `card-${idx}`;
      card.innerHTML = `
        <div class="card-top">
          <div class="letter">${c.l}${c.l.toLowerCase()}</div>
          <div class="sound-badge">${c.s}</div>
        </div>
        <div class="emoji-wrapper">${c.e}</div>
        <div class="word"><span>${c.w[0]}</span>${c.w.slice(1)}</div>
        <div class="sentence-bar">${c.l} says ${c.s} like ${c.w}!</div>
        <div class="mouth-tip">
          <div class="mouth-icon">${c.m}</div>
          <div class="mouth-text">${c.tip}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function highlight(index) {
    // Remove previous focus
    document.querySelectorAll('.letter-card').forEach(c => c.classList.remove('focused'));
    
    currentIndex = index;
    const card = document.getElementById(`card-${currentIndex}`);
    if (card) {
      card.classList.add('focused');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Update progress bar
    const progress = ((currentIndex + 1) / consonants.length) * 100;
    document.getElementById('progressFill').style.width = progress + '%';
  }

  function next() {
    let nextIdx = currentIndex + 1;
    if (nextIdx >= consonants.length) nextIdx = 0;
    highlight(nextIdx);
    if (isAuto) startTimer();
  }

  function prev() {
    let prevIdx = currentIndex - 1;
    if (prevIdx < 0) prevIdx = consonants.length - 1;
    highlight(prevIdx);
  }

  function startTimer() {
    clearTimeout(autoTimer);
    autoTimer = setTimeout(next, slideDuration);
  }

  function toggleAuto() {
    isAuto = !isAuto;
    const btn = document.getElementById('playPause');
    if (isAuto) {
      btn.textContent = "Pause Auto";
      btn.classList.add('active');
      next();
    } else {
      btn.textContent = "Play Auto";
      btn.classList.remove('active');
      clearTimeout(autoTimer);
    }
  }

  function manualNext() {
    clearTimeout(autoTimer);
    next();
    if (isAuto) startTimer();
  }

  function manualPrev() {
    clearTimeout(autoTimer);
    prev();
    if (isAuto) startTimer();
  }

  // Init
  createGrid();
  setTimeout(() => {
    highlight(0);
    if (isAuto) startTimer();
  }, 500);

</script>
</body>
</html>
